name: build-publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write
  security-events: write

env:
  IMAGE_NAME: docker-yourls
  REGISTRY: docker.io

jobs:
  build-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Locate dockerfile
        id: df
        run: |
          for f in Containerfile Dockerfile containerfile dockerfile; do
            if [ -f "$f" ]; then
              echo "path=$f" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "::error::No Containerfile or Dockerfile at repo root"
          exit 1

      - name: Read build-args
        id: bargs
        run: |
          if [ -f build-args.txt ]; then
            {
              echo 'value<<__EOF__'
              grep -vE '^[[:space:]]*(#|$)' build-args.txt || true
              echo '__EOF__'
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo 'value<<__EOF__'
              echo '__EOF__'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Hadolint (warn only)
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        continue-on-error: true
        with:
          dockerfile: ${{ steps.df.outputs.path }}
          failure-threshold: error
          no-fail: true

      - name: Checkov (warn only)
        uses: bridgecrewio/checkov-action@de2bfaecd21d58ef232e0d2a3391c33c32c460d7 # master
        continue-on-error: true
        with:
          directory: .
          quiet: true
          soft_fail: true

      - name: ShellCheck (warn only)
        uses: ludeeus/action-shellcheck@00b27aa7cb85167568cb48a3838b75f4265f2bca # master
        continue-on-error: true
        with:
          severity: error

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Docker Hub login
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ steps.df.outputs.path }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ steps.bargs.outputs.value }}
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign image (keyless)
        env:
          IMAGE_REF: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${{ env.IMAGE_REF }}"

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attach SBOM attestation
        env:
          IMAGE_REF: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        run: cosign attest --yes --predicate sbom.spdx.json --type spdxjson "${{ env.IMAGE_REF }}"

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@876cf04c63f65e9799bcf1043b584e72469c7143 # master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN
          exit-code: '0'
          limit-severities-for-sarif: 'true'

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@876cf04c63f65e9799bcf1043b584e72469c7143 # master
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN
          exit-code: '0'
          limit-severities-for-sarif: 'true'

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@876cf04c63f65e9799bcf1043b584e72469c7143 # master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN
          exit-code: '0'
          limit-severities-for-sarif: 'true'

      - name: Upload Trivy filesystem SARIF to Security tab
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Upload Trivy config SARIF to Security tab
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3
        if: always()
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

      - name: Upload Trivy image SARIF to Security tab
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Upload Trivy SARIFs as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: trivy-results
          path: |
            trivy-fs.sarif
            trivy-config.sarif
            trivy-image.sarif
          retention-days: 90
